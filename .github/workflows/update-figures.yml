name: Update Benchmark Figure

on:
  #push:
  #  branches:
  #    - main  # Run when new commits are pushed to main
  #  paths-ignore:
  #    - 'eurohpc_dashboard*.png'  # Ignore changes to the figure
  #schedule:
  #  - cron: '0 0 * * *'  # Runs daily at midnight (adjust as needed)
  workflow_dispatch:  # Allows manual triggering from the GitHub UI

jobs:
  update-figure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Needed for pushing changes

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'  # Use the latest Python 3 version

      - name: Install dependencies
        run: |
          pip install numpy matplotlib

      - name: Run benchmark analysis
        run: python analyse_benchmark.py

      - name: Commit and push updated figures if there are changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Check for changes in any eurohpc_dashboard_*.png file
          if git diff --quiet -- "eurohpc_dashboard_*.png"; then
            echo "No changes detected in figures."
          else
            git add eurohpc_dashboard_*.png
            git commit -m "Automated update of benchmark plots"
            git push origin main
          fi

